version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: soc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - soc-mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: soc_ai_dashboard

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/
      DB_NAME: soc_ai_dashboard
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EVENT_INTERVAL: "4"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme-in-production-use-a-strong-random-key}

  frontend:
    image: node:22-alpine
    container_name: soc-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  soc-mongodb-data:
